<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Browser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-tertiary: #1f2937;
            --toolbar-bg: rgba(17, 24, 39, 0.85);
            --text-primary: #60a5fa;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: rgba(255, 255, 255, 0.08);
            --hover-bg: rgba(96, 165, 250, 0.12);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gradient-1: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            --gradient-2: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 20px var(--accent-glow);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f1f5f9;
            --toolbar-bg: rgba(255, 255, 255, 0.9);
            --text-primary: #2563eb;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border-color: rgba(0, 0, 0, 0.08);
            --hover-bg: rgba(37, 99, 235, 0.1);
            --accent: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.2);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family);
            background: var(--bg-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: var(--transition);
            color: var(--text-secondary);
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--toolbar-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
            transition: var(--transition);
        }

        .toolbar-left { display: flex; alignItems: center; gap: 4px; }
        .nav-buttons { display: flex; gap: 4px; }

        .nav-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 18px;
            transition: var(--transition);
            position: relative;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: var(--gradient-2);
            opacity: 0;
            transition: var(--transition);
        }

        .nav-btn:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        .nav-btn:active { transform: translateY(0); }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .nav-btn svg {
            width: 18px;
            height: 18px;
            position: relative;
            z-index: 1;
        }

        .address-bar {
            flex: 1;
            max-width: 600px;
            position: relative;
        }

        .address-bar input {
            width: 100%;
            padding: 10px 16px 10px 44px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            color: var(--text-secondary);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }

        .address-bar input:focus {
            border-color: var(--accent);
            box-shadow: var(--shadow-glow);
            background: var(--bg-secondary);
        }

        .address-bar input::placeholder { color: var(--text-muted); }

        .address-bar .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            pointer-events: none;
        }

        .toolbar-right {
            display: flex;
            gap: 6px;
            margin-left: auto;
        }

        .toolbar-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 16px;
            transition: var(--transition);
        }

        .toolbar-btn:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .toolbar-btn svg {
            width: 18px;
            height: 18px;
        }

        .theme-toggle {
            position: relative;
            overflow: hidden;
        }

        .theme-toggle .sun-icon,
        .theme-toggle .moon-icon {
            position: absolute;
            transition: var(--transition);
        }

        .theme-toggle .sun-icon {
            opacity: 1;
            transform: translateY(0) rotate(0deg);
        }

        .theme-toggle .moon-icon {
            opacity: 0;
            transform: translateY(20px) rotate(-90deg);
        }

        [data-theme="light"] .theme-toggle .sun-icon {
            opacity: 0;
            transform: translateY(-20px) rotate(90deg);
        }

        [data-theme="light"] .theme-toggle .moon-icon {
            opacity: 1;
            transform: translateY(0) rotate(0deg);
        }

        .browser-content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .home-page {
            position: absolute;
            inset: 0;
            padding: 40px;
            overflow-y: auto;
            background: var(--bg-primary);
            transition: var(--transition);
        }

        .home-page.hidden { display: none; }

        .speed-dial {
            max-width: 900px;
            margin: 0 auto;
        }

        .speed-dial-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .speed-dial-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--gradient-2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .speed-dial-header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .search-box {
            max-width: 560px;
            margin: 0 auto 48px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 16px 20px 16px 52px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            color: var(--text-secondary);
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
            box-shadow: var(--shadow-md);
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: var(--shadow-lg), var(--shadow-glow);
        }

        .search-box .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: var(--text-muted);
        }

        .quick-links {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 48px;
        }

        .quick-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 24px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            color: inherit;
        }

        .quick-link:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: var(--shadow-lg), var(--shadow-glow);
        }

        .quick-link .icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-1);
            border-radius: var(--radius-md);
            font-size: 22px;
            color: white;
        }

        .quick-link .icon i.fa-brands {
            font-size: 24px;
        }

        .quick-link .label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
        }

        .bookmarks-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
        }

        .bookmark-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }

        .bookmark-item:hover {
            border-color: var(--accent);
            background: var(--hover-bg);
        }

        .bookmark-item .favicon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
        }

        .bookmark-item .favicon i.fa-brands {
            font-size: 18px;
        }

        .bookmark-item .title {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .bookmark-item .delete-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--danger);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 12px;
            cursor: pointer;
            opacity: 0;
            transition: var(--transition);
        }

        .bookmark-item:hover .delete-btn { opacity: 1; }

        .add-bookmark {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            min-height: 80px;
            background: transparent;
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-muted);
        }

        .add-bookmark:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--hover-bg);
        }

        .add-bookmark span {
            font-size: 24px;
        }

        .iframe-container {
            position: absolute;
            inset: 0;
            background: #fff;
        }

        .iframe-container.hidden { display: none; }

        .browser-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 24px;
            z-index: 1000;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading-overlay h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--gradient-2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal-overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            max-width: 400px;
            width: 90%;
            box-shadow: var(--shadow-lg);
            transform: scale(0.95) translateY(20px);
            transition: var(--transition);
        }

        .modal-overlay.visible .modal {
            transform: scale(1) translateY(0);
        }

        .modal h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .modal input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            margin-bottom: 12px;
            transition: var(--transition);
        }

        .modal input:focus {
            border-color: var(--accent);
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
        }

        .modal-btn.secondary {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        .modal-btn.primary {
            background: var(--accent);
            color: white;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .downloads-panel {
            position: fixed;
            right: 0;
            top: 58px;
            bottom: 0;
            width: 320px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            transform: translateX(100%);
            transition: var(--transition);
            z-index: 200;
            display: flex;
            flex-direction: column;
        }

        .downloads-panel.visible {
            transform: translateX(0);
        }

        .downloads-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .downloads-header h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .downloads-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .download-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            margin-bottom: 8px;
        }

        .download-item .icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent);
            border-radius: var(--radius-sm);
            color: white;
        }

        .download-item .info { flex: 1; }
        .download-item .filename { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
        .download-item .progress { font-size: 12px; color: var(--text-muted); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        @media (max-width: 768px) {
            .quick-links { grid-template-columns: repeat(2, 1fr); }
            .bookmarks-grid { grid-template-columns: repeat(3, 1fr); }
            .home-page { padding: 24px; }
            .speed-dial-header h1 { font-size: 1.75rem; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <h1>Nova Browser</h1>
        <div class="spinner"></div>
    </div>

    <div class="toolbar">
        <div class="toolbar-left">
            <div class="nav-buttons">
                <button class="nav-btn" id="backBtn" title="Back (Alt+Left)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>
                <button class="nav-btn" id="forwardBtn" title="Forward (Alt+Right)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
                <button class="nav-btn" id="refreshBtn" title="Refresh (Ctrl+R)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                </button>
                <button class="nav-btn" id="homeBtn" title="Home (Ctrl+H)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                </button>
            </div>
            <div class="address-bar">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input type="text" id="urlInput" placeholder="Enter URL or search..." autocomplete="off">
            </div>
        </div>
        <div class="toolbar-right">
            <button class="toolbar-btn" id="bookmarkBtn" title="Bookmark (Ctrl+D)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            </button>
            <button class="toolbar-btn" id="downloadsBtn" title="Downloads">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
            <button class="toolbar-btn theme-toggle" id="themeBtn" title="Toggle Theme">
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
    </div>

    <div class="browser-content">
        <div class="home-page" id="homePage">
            <div class="speed-dial">
                <div class="speed-dial-header">
                    <h1>Nova Browser</h1>
                    <p>Fast, simple, beautiful</p>
                </div>
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                    <input type="text" id="homeSearch" placeholder="Search or enter URL..." autocomplete="off">
                </div>
                <div class="quick-links">
                    <a class="quick-link" data-url="https://google.com">
                        <div class="icon"><i class="fa-brands fa-google"></i></div>
                        <span class="label">Google</span>
                    </a>
                    <a class="quick-link" data-url="https://youtube.com">
                        <div class="icon"><i class="fa-brands fa-youtube"></i></div>
                        <span class="label">YouTube</span>
                    </a>
                    <a class="quick-link" data-url="https://github.com">
                        <div class="icon"><i class="fa-brands fa-github"></i></div>
                        <span class="label">GitHub</span>
                    </a>
                    <a class="quick-link" data-url="https://twitter.com">
                        <div class="icon"><i class="fa-brands fa-x-twitter"></i></div>
                        <span class="label">Twitter</span>
                    </a>
                </div>
                <div class="section-title">Bookmarks</div>
                <div class="bookmarks-grid" id="bookmarksGrid">
                    <div class="add-bookmark" id="addBookmarkBtn">
                        <span>+</span>
                        <span class="title">Add Bookmark</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="iframe-container" id="iframeContainer">
            <iframe class="browser-frame" id="browserFrame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups"></iframe>
        </div>
    </div>

    <div class="downloads-panel" id="downloadsPanel">
        <div class="downloads-header">
            <h3>Downloads</h3>
            <button class="toolbar-btn" id="closeDownloadsBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="downloads-list" id="downloadsList">
            <p style="text-align: center; color: var(--text-muted); padding: 24px;">No downloads yet</p>
        </div>
    </div>

    <div class="modal-overlay" id="bookmarkModal">
        <div class="modal">
            <h2>Add Bookmark</h2>
            <input type="text" id="bookmarkTitle" placeholder="Title">
            <input type="text" id="bookmarkUrl" placeholder="URL">
            <div class="modal-buttons">
                <button class="modal-btn secondary" id="cancelBookmark">Cancel</button>
                <button class="modal-btn primary" id="saveBookmark">Save</button>
            </div>
        </div>
    </div>

    <script>
        const PROXY_URL = 'https://dawn-surf-432c.samway.workers.dev';
        
        const elements = {
            loadingOverlay: document.getElementById('loadingOverlay'),
            homePage: document.getElementById('homePage'),
            iframeContainer: document.getElementById('iframeContainer'),
            browserFrame: document.getElementById('browserFrame'),
            urlInput: document.getElementById('urlInput'),
            homeSearch: document.getElementById('homeSearch'),
            backBtn: document.getElementById('backBtn'),
            forwardBtn: document.getElementById('forwardBtn'),
            refreshBtn: document.getElementById('refreshBtn'),
            homeBtn: document.getElementById('homeBtn'),
            bookmarkBtn: document.getElementById('bookmarkBtn'),
            themeBtn: document.getElementById('themeBtn'),
            downloadsBtn: document.getElementById('downloadsBtn'),
            closeDownloadsBtn: document.getElementById('closeDownloadsBtn'),
            downloadsPanel: document.getElementById('downloadsPanel'),
            downloadsList: document.getElementById('downloadsList'),
            bookmarksGrid: document.getElementById('bookmarksGrid'),
            bookmarkModal: document.getElementById('bookmarkModal'),
            bookmarkTitle: document.getElementById('bookmarkTitle'),
            bookmarkUrl: document.getElementById('bookmarkUrl'),
            cancelBookmark: document.getElementById('cancelBookmark'),
            saveBookmark: document.getElementById('saveBookmark'),
            addBookmarkBtn: document.getElementById('addBookmarkBtn'),
            quickLinks: document.querySelectorAll('.quick-link')
        };

        let historyStack = [];
        let historyIndex = -1;
        let isOnHomePage = true;
        let bookmarks = JSON.parse(localStorage.getItem('nova_bookmarks') || '[]');
        let currentUrl = '';
        let theme = localStorage.getItem('nova_theme') || 'dark';

        function initTheme() {
            document.documentElement.setAttribute('data-theme', theme);
            if (theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        }

        function toggleTheme() {
            theme = theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('nova_theme', theme);
        }

        function navigate(input, addToHistory = true) {
            input = input.trim();
            if (!input) return;

            let url = input;
            if (!input.startsWith('http://') && !input.startsWith('https://')) {
                if (!input.includes('.') || input.includes(' ')) {
                    url = PROXY_URL + '?url=' + encodeURIComponent('https://www.google.com/search?q=' + encodeURIComponent(input));
                } else {
                    url = PROXY_URL + '?url=' + encodeURIComponent('https://' + input);
                }
            } else {
                url = PROXY_URL + '?url=' + encodeURIComponent(input);
            }

            currentUrl = url;

            if (addToHistory) {
                if (historyIndex < historyStack.length - 1) {
                    historyStack = historyStack.slice(0, historyIndex + 1);
                }
                historyStack.push(url);
                historyIndex++;
            }

            showBrowser(url);
            updateNavButtons();
        }

        function showBrowser(url) {
            isOnHomePage = false;
            elements.homePage.classList.add('hidden');
            elements.iframeContainer.classList.remove('hidden');
            elements.browserFrame.src = url;
            elements.urlInput.value = url.replace(PROXY_URL + '?url=', '');
            loadingOverlay.classList.remove('hidden');
        }

        function showHome() {
            isOnHomePage = true;
            elements.homePage.classList.remove('hidden');
            elements.iframeContainer.classList.add('hidden');
            elements.browserFrame.src = 'about:blank';
            elements.urlInput.value = '';
            updateNavButtons();
        }

        function goBack() {
            if (historyIndex > 0) {
                historyIndex--;
                const url = historyStack[historyIndex];
                currentUrl = url;
                showBrowser(url);
            } else if (!isOnHomePage) {
                showHome();
            }
        }

        function goForward() {
            if (historyIndex < historyStack.length - 1) {
                historyIndex++;
                const url = historyStack[historyIndex];
                currentUrl = url;
                showBrowser(url);
            }
        }

        function refresh() {
            if (currentUrl) {
                showBrowser(currentUrl);
            }
        }

        function updateNavButtons() {
            elements.backBtn.disabled = historyIndex <= 0 && isOnHomePage;
            elements.forwardBtn.disabled = historyIndex >= historyStack.length - 1;
        }

        function renderBookmarks() {
            const grid = elements.bookmarksGrid;
            grid.innerHTML = '';
            
            const iconMap = {
                'google': 'fa-google',
                'youtube': 'fa-youtube',
                'github': 'fa-github',
                'twitter': 'fa-twitter',
                'x': 'fa-x-twitter',
                'facebook': 'fa-facebook',
                'instagram': 'fa-instagram',
                'reddit': 'fa-reddit',
                'linkedin': 'fa-linkedin',
                'discord': 'fa-discord',
                'amazon': 'fa-amazon',
                'netflix': 'fa-netflix',
                'spotify': 'fa-spotify',
                'wikipedia': 'fa-wikipedia-w',
                'stackoverflow': 'fa-stack-overflow',
                'twitch': 'fa-twitch'
            };
            
            const getIcon = (title) => {
                const key = title.toLowerCase().replace(/[^a-z]/g, '');
                return iconMap[key] ? `<i class="fa-brands ${iconMap[key]}"></i>` : title.charAt(0).toUpperCase();
            };
            
            bookmarks.forEach((bookmark, index) => {
                const item = document.createElement('div');
                item.className = 'bookmark-item';
                item.innerHTML = `
                    <div class="favicon">${getIcon(bookmark.title)}</div>
                    <div class="title">${bookmark.title}</div>
                    <button class="delete-btn" data-index="${index}"><i class="fa-solid fa-xmark"></i></button>
                `;
                item.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('delete-btn')) {
                        navigate(bookmark.url);
                    }
                });
                item.querySelector('.delete-btn').addEventListener('click', () => deleteBookmark(index));
                grid.appendChild(item);
            });

            const addBtn = document.createElement('div');
            addBtn.className = 'add-bookmark';
            addBtn.id = 'addBookmarkBtn';
            addBtn.innerHTML = '<i class="fa-solid fa-plus"></i><span class="title">Add Bookmark</span>';
            addBtn.addEventListener('click', openBookmarkModal);
            grid.appendChild(addBtn);
        }

        function isBookmarked(url) {
            return bookmarks.some(b => b.url === url);
        }

        function updateBookmarkButton() {
            const url = currentUrl ? currentUrl.replace(PROXY_URL + '?url=', '') : '';
            const btn = elements.bookmarkBtn;
            if (isBookmarked(url)) {
                btn.innerHTML = '<i class="fa-solid fa-bookmark" style="color: var(--accent);"></i>';
                btn.title = 'Bookmarked (Ctrl+D) - Click to remove';
            } else {
                btn.innerHTML = '<i class="fa-regular fa-bookmark"></i>';
                btn.title = 'Bookmark (Ctrl+D)';
            }
        }

        function addBookmark(title, url) {
            if (isBookmarked(url)) return;
            bookmarks.push({ title, url });
            localStorage.setItem('nova_bookmarks', JSON.stringify(bookmarks));
            renderBookmarks();
            updateBookmarkButton();
        }

        function deleteBookmark(index) {
            bookmarks.splice(index, 1);
            localStorage.setItem('nova_bookmarks', JSON.stringify(bookmarks));
            renderBookmarks();
            updateBookmarkButton();
        }

        function openBookmarkModal() {
            elements.bookmarkTitle.value = currentUrl ? extractDomain(currentUrl) : '';
            elements.bookmarkUrl.value = currentUrl ? currentUrl.replace(PROXY_URL + '?url=', '') : '';
            elements.bookmarkModal.classList.add('visible');
        }

        function closeBookmarkModal() {
            elements.bookmarkModal.classList.remove('visible');
        }

        function extractDomain(url) {
            try {
                const decoded = decodeURIComponent(url);
                const match = decoded.match(/url=([^&]+)/);
                if (match) {
                    return new URL(match[1]).hostname.replace('www.', '');
                }
            } catch {}
            return 'Bookmark';
        }

        function addDownload(filename) {
            const list = elements.downloadsList;
            const emptyMsg = list.querySelector('p');
            if (emptyMsg) emptyMsg.remove();

            const item = document.createElement('div');
            item.className = 'download-item';
            item.innerHTML = `
                <div class="icon"><i class="fa-solid fa-file"></i></div>
                <div class="info">
                    <div class="filename">${filename}</div>
                    <div class="progress"><i class="fa-solid fa-check"></i> Downloaded</div>
                </div>
            `;
            list.appendChild(item);
        }

        elements.urlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') navigate(e.target.value);
        });

        elements.homeSearch.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') navigate(e.target.value);
        });

        elements.backBtn.addEventListener('click', goBack);
        elements.forwardBtn.addEventListener('click', goForward);
        elements.refreshBtn.addEventListener('click', refresh);
        elements.homeBtn.addEventListener('click', showHome);
        elements.themeBtn.addEventListener('click', toggleTheme);
        
        elements.bookmarkBtn.addEventListener('click', () => {
            const url = currentUrl ? currentUrl.replace(PROXY_URL + '?url=', '') : '';
            if (!url) return;
            
            if (isBookmarked(url)) {
                const index = bookmarks.findIndex(b => b.url === url);
                if (index !== -1) {
                    deleteBookmark(index);
                }
            } else {
                const title = extractDomain(currentUrl);
                addBookmark(title, url);
            }
        });

        elements.downloadsBtn.addEventListener('click', () => {
            elements.downloadsPanel.classList.toggle('visible');
        });

        elements.closeDownloadsBtn.addEventListener('click', () => {
            elements.downloadsPanel.classList.remove('visible');
        });

        elements.quickLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                navigate(link.dataset.url);
            });
        });

        elements.cancelBookmark.addEventListener('click', closeBookmarkModal);
        elements.saveBookmark.addEventListener('click', () => {
            const title = elements.bookmarkTitle.value.trim();
            const url = elements.bookmarkUrl.value.trim();
            if (title && url) {
                addBookmark(title, url);
                closeBookmarkModal();
            }
        });

        elements.bookmarkModal.addEventListener('click', (e) => {
            if (e.target === elements.bookmarkModal) closeBookmarkModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                switch (e.key.toLowerCase()) {
                    case 'l':
                        e.preventDefault();
                        elements.urlInput.focus();
                        elements.urlInput.select();
                        break;
                    case 'd':
                        e.preventDefault();
                        if (currentUrl) openBookmarkModal();
                        break;
                    case 'r':
                        e.preventDefault();
                        refresh();
                        break;
                    case 'h':
                        e.preventDefault();
                        showHome();
                        break;
                    case 'b':
                        e.preventDefault();
                        goBack();
                        break;
                }
            } else if (e.altKey) {
                if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    goBack();
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    goForward();
                }
            } else if (e.key === 'Escape') {
                closeBookmarkModal();
                elements.downloadsPanel.classList.remove('visible');
            }
        });

        elements.browserFrame.addEventListener('load', () => {
            elements.loadingOverlay.classList.add('hidden');
            updateBookmarkButton();
            try {
                const url = elements.browserFrame.src;
                if (url && url !== 'about:blank') {
                    addDownload(extractDomain(url));
                }
            } catch {}
        });

        initTheme();
        renderBookmarks();
        showHome();
        updateBookmarkButton();
    </script>
</body>
</html>
